# This file is used to define the scenarios that are run by snakemake. Each entry on the first level is a scenario. Each scenario can contain configuration overrides with respect to the config/config.yaml settings.
#
# Example
#
# custom-scenario: # name of the scenario
#   electricity:
#       renewable_carriers: [wind, solar] # override the list of renewable carriers

cy2013-nomds:
  sector:
    stores: ["H2"]
    storage_units: ["li-ion battery", "vanadium", "lair", "pair"]

cy2013-ldes:
  sector:
    stores: ["H2"]
    storage_units: ["li-ion battery", "vanadium", "lair", "pair", "iron-air"]

cy2013-uldes:
  sector:
    stores: ["H2"]
    storage_units: ["li-ion battery", "vanadium", "lair", "pair", "co2es"]

cy2013-mds:
  sector:
    stores: ["H2"]
    storage_units: ["li-ion battery", "vanadium", "lair", "pair", "iron-air", "co2es"]

cy2010-mds:
  sector:
    stores: ["H2"]
    storage_units: ["li-ion battery", "vanadium", "lair", "pair", "iron-air", "co2es"]
  snapshots:
    start: "2010-01-01"
    end: "2011-01-01"
  atlite:
    default_cutout: europe-2010-sarah3-era5
    cutouts:
      europe-2010-sarah3-era5:
        module: [sarah, era5] # in priority order
        x: [-12., 42.]
        y: [33., 72.]
        dx: 0.3
        dy: 0.3
        time: ['2010', '2010']
  renewable:
    onwind:
      cutout: europe-2010-sarah3-era5
    offwind-ac:
      cutout: europe-2010-sarah3-era5
    offwind-dc:
      cutout: europe-2010-sarah3-era5
    offwind-float:
      cutout: europe-2010-sarah3-era5
    solar:
      cutout: europe-2010-sarah3-era5
    solar-hsat:
      cutout: europe-2010-sarah3-era5
    hydro:
      cutout: europe-2010-sarah3-era5

